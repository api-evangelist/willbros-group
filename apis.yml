aid: willbros-group
name: Willbros Group
description: >-
  Willbros Group was a specialty energy infrastructure contractor that served the oil
  and gas, power, refining, petrochemical, and other industries before being acquired
  by Primoris Services Corporation. The company provided engineering, procurement, and
  construction (EPC) services for pipeline, facility, and electrical infrastructure
  projects. Willbros Group was acquired by Primoris Services in 2018 and no longer
  operates independently. No public developer APIs are available for this organization.
